<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>푸르른 기록</title>
    <style>
        /* 기본 UI 스타일 */
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background-color: #f2f2f7; color: #333; padding-bottom: 140px; }
        #bg-image { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; opacity: 0.3; display: none; }
        
        /* 비밀번호 잠금 화면 */
        #lock-screen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: #f2f2f7; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #lock-screen input { padding: 15px; font-size: 20px; border: 2px solid #3b82f6; border-radius: 10px; width: 200px; text-align: center; margin-bottom: 15px; outline: none; }
        #lock-screen button { padding: 15px 30px; font-size: 18px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* 메인 콘텐츠 */
        #main-content { display: none; }
        
        /* 상단 탭 */
        .tabs { display: flex; overflow-x: auto; padding: 10px 15px; background: rgba(255,255,255,0.9); border-bottom: 1px solid #ddd; white-space: nowrap; gap: 8px; position: sticky; top: 0; z-index: 100; }
        .tab { padding: 8px 18px; border-radius: 20px; background: #eee; border: none; font-size: 14px; cursor: pointer; color: #555; }
        .tab.active { background: #3b82f6; color: white; font-weight: bold; }
        
        /* 글쓰기 에디터 */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .editor { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .editor select { padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; outline: none; color: #3b82f6; font-weight: bold; }
        .editor input[type="text"] { width: 100%; border: none; border-bottom: 1px solid #eee; padding: 10px 0; font-size: 18px; font-weight: bold; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .editor textarea { width: 100%; border: none; height: 80px; resize: none; font-size: 16px; outline: none; box-sizing: border-box; color: #555; }
        .editor-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .btn-submit { background: #3b82f6; color: white; border: none; padding: 12px 30px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* 목록 스타일 */
        .post { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee; }
        .post-meta { font-size: 14px; color: #888; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .post-cat { color: #3b82f6; font-weight: bold; }
        .post-title { font-size: 17px; font-weight: bold; color: #111; margin: 5px 0; }
        .post-content { font-size: 15px; line-height: 1.6; white-space: pre-wrap; color: #444; }
        .post-images { display: flex; gap: 8px; overflow-x: auto; margin-top: 10px; }
        .post-images img { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; }
        
        /* BGM 플레이어 */
        .bgm-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(59, 130, 246, 0.95); color: white; border-radius: 20px; padding: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); backdrop-filter: blur(10px); z-index: 1000; }
        .bgm-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: bold; font-size: 13px; }
        .bgm-iframe-container { width: 100%; height: 60px; border-radius: 10px; overflow: hidden; background: #000; }
        
        #img-preview { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; }
        #img-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="color: #3b82f6; margin-bottom: 20px;">🔒 푸르른 기록</h2>
        <input type="password" id="pwd-input" placeholder="비밀번호">
        <button onclick="checkPwd()">입장하기</button>
    </div>

    <div id="main-content">
        <img id="bg-image" src="" onerror="this.style.display='none'">
        <div class="tabs" id="tab-container">
            <button class="tab active" onclick="setTab('전체')">전체</button>
            <button class="tab" onclick="setTab('일반')">일반</button>
            <button class="tab" onclick="setTab('일기')">일기</button>
            <button class="tab" onclick="setTab('메모')">메모</button>
            <button class="tab" onclick="setTab('페르소나')">페르소나</button>
            <button class="tab" onclick="manageSettings()">⚙️ 설정</button>
        </div>

        <div class="container">
            <div class="editor">
                <select id="cat-select">
                    <option value="일반">일반</option>
                    <option value="일기">일기</option>
                    <option value="메모">메모</option>
                    <option value="페르소나">페르소나</option>
                </select>
                <input type="text" id="title" placeholder="제목을 입력하세요">
                <textarea id="content" placeholder="오늘의 기록을 남겨보세요..."></textarea>
                <div id="img-preview"></div>
                <div class="editor-footer">
                    <label style="color: #888; font-size: 14px; cursor: pointer;">📷 사진 추가 <input type="file" id="file-input" multiple accept="image/*" style="display: none;"></label>
                    <button class="btn-submit" onclick="savePost()">등록</button>
                </div>
            </div>
            <div id="post-list"></div>
        </div>

        <div class="bgm-bar">
            <div class="bgm-header"><span>🎵 재생 중: 요청하신 음악</span><span>BGM</span></div>
            <div class="bgm-iframe-container">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/NQPtBQhtTYQ?autoplay=1&mute=1&loop=1&playlist=NQPtBQhtTYQ" frameborder="0" allow="autoplay; encrypted-media"></iframe>
            </div>
            <p style="font-size: 10px; margin-top: 5px; opacity: 0.8; text-align: center;">💡 화면을 터치하면 소리가 들립니다!</p>
        </div>
    </div>

    <script>
        function checkPwd() {
            if (document.getElementById('pwd-input').value === '1969') {
                sessionStorage.setItem('auth_blue', 'true');
                unlockScreen();
            } else { alert('비밀번호가 틀렸습니다.'); }
        }

        function unlockScreen() {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadPosts();
        }

        window.onload = () => {
            if (sessionStorage.getItem('auth_blue') === 'true') unlockScreen();
            const savedBg = localStorage.getItem('blue_bg_img');
            if(savedBg) { document.getElementById('bg-image').src = savedBg; document.getElementById('bg-image').style.display = 'block'; }
        };

        let images = [];
        document.getElementById('file-input').addEventListener('change', function(e) {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (event) => { images.push(event.target.result); renderPreview(); };
                reader.readAsDataURL(file);
            });
        });

        function renderPreview() { document.getElementById('img-preview').innerHTML = images.map(src => `<img src="${src}">`).join(''); }

        function savePost() {
            const cat = document.getElementById('cat-select').value;
            const title = document.getElementById('title').value || "제목 없음";
            const content = document.getElementById('content').value;
            if (!content && images.length === 0) return;
            const posts = JSON.parse(localStorage.getItem('blue_posts_v2') || '[]');
            posts.unshift({ cat, title, content, images: [...images], date: new Date().toLocaleDateString() });
            localStorage.setItem('blue_posts_v2', JSON.stringify(posts));
            document.getElementById('title').value = ''; document.getElementById('content').value = '';
            images = []; renderPreview(); loadPosts();
        }

        let currentTab = '전체';
        function setTab(name) { currentTab = name; document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === name)); loadPosts(); }

        function loadPosts() {
            const posts = JSON.parse(localStorage.getItem('blue_posts_v2') || '[]');
            const filtered = currentTab === '전체' ? posts : posts.filter(p => p.cat === currentTab);
            document.getElementById('post-list').innerHTML = filtered.map(p => `
                <div class="post">
                    <div class="post-meta"><span class="post-cat">[${p.cat}]</span><span>${p.date}</span></div>
                    <div class="post-title">${p.title}</div>
                    <div class="post-content">${p.content}</div>
                    <div class="post-images">${p.images.map(img => `<img src="${img}">`).join('')}</div>
                </div>
            `).join('');
        }

        function manageSettings() {
            const url = prompt("배경 이미지 URL을 입력하세요 (공백 시 초기화)");
            if(url !== null) { localStorage.setItem('blue_bg_img', url); location.reload(); }
        }
    </script>
</body>
</html>
