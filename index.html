<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>푸르른 기록</title>
    <style>
        :root { --point-blue: #007aff; --bg-color: #f0f2f5; --container-bg: rgba(255, 255, 255, 0.92); --text-main: #1d1d1f; --border: rgba(0,0,0,0.08); }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg-color) no-repeat center center fixed; background-size: cover; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 0; }
        .container { width: 95%; max-width: 600px; background: var(--container-bg); padding: 25px; border-radius: 24px; backdrop-filter: blur(15px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .memo-images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 15px; }
        .memo-images-grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; }
        .memo-images-scroll { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .memo-images-scroll img { width: 100%; border-radius: 12px; }
        #image-preview-container { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 10px; }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="site-title" contenteditable="true" style="font-size: 1.8rem; margin-bottom: 15px;">푸르른 기록</h1>
        <div id="editor-box" style="background: #fff; padding: 18px; border-radius: 18px; margin-bottom: 25px; border: 1px solid var(--border);">
            <input type="text" id="memo-title-input" style="width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 8px 0; font-size: 1.1rem; font-weight: bold; outline: none;" placeholder="제목">
            <textarea id="memo-input" style="width: 100%; border: none; outline: none; resize: none; min-height: 100px; margin-top:10px;" placeholder="기록할 내용을 입력하세요..."></textarea>
            <div id="image-preview-container"></div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <label style="cursor:pointer; font-size:0.8rem; color:#888;">📷 사진 추가<input type="file" id="img-upload" hidden accept="image/*" multiple></label>
                <button onclick="saveMemo()" style="padding:10px 25px; background:var(--point-blue); color:white; border:none; border-radius:12px; font-weight:bold;">등록</button>
            </div>
        </div>
        <div id="memo-list"></div>
    </div>

    <script>
        let uploadedImages = [];
        let viewMode = 'grid';

        document.getElementById('img-upload').onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (ex) => { uploadedImages.push(ex.target.result); renderPreviews(); };
                reader.readAsDataURL(file);
            });
        };

        function renderPreviews() {
            document.getElementById('image-preview-container').innerHTML = uploadedImages.map(src => `<img src="${src}" class="preview-img">`).join('');
        }

        function saveMemo() {
            const title = document.getElementById('memo-title-input').value || "제목 없음";
            const content = document.getElementById('memo-input').value;
            if(!content && uploadedImages.length === 0) return;
            const memos = JSON.parse(localStorage.getItem('myMemos') || "[]");
            memos.unshift({ title, content, images: [...uploadedImages], date: new Date().toLocaleDateString() });
            localStorage.setItem('myMemos', JSON.stringify(memos));
            uploadedImages = []; renderPreviews();
            document.getElementById('memo-title-input').value = ""; document.getElementById('memo-input').value = "";
            displayMemos();
        }

        function displayMemos() {
            const list = document.getElementById('memo-list');
            const memos = JSON.parse(localStorage.getItem('myMemos') || "[]");
            list.innerHTML = memos.map(m => `
                <div style="border-bottom:1px solid #eee; padding:15px 0;">
                    <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>${m.title}</span><span style="font-size:0.8rem; color:#888;">${m.date}</span></div>
                    <p style="white-space:pre-wrap;">${m.content}</p>
                    <div class="memo-images-${viewMode}">${m.images.map(img => `<img src="${img}">`).join('')}</div>
                </div>
            `).join('');
        }
        window.onload = displayMemos;
    </script>
</body>
</html>
